events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  # kwln1.local → kowloon1:3000
  server {
    listen 80;
    listen 443 ssl;
    server_name kwln1.local;

    ssl_certificate     /etc/nginx/certs/local.crt;
    ssl_certificate_key /etc/nginx/certs/local.key;

    location /files/ {
      set $upstream http://kowloon1:3000;
      proxy_pass             $upstream;
      proxy_set_header       Host              $host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_buffering        off;
      proxy_read_timeout     300s;
    }

    location / {
      set $upstream http://kowloon1:3000;
      proxy_pass         $upstream;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }

  # kwln2.local → kowloon2:3000
  server {
    listen 80;
    listen 443 ssl;
    server_name kwln2.local;

    ssl_certificate     /etc/nginx/certs/local.crt;
    ssl_certificate_key /etc/nginx/certs/local.key;

    location /files/ {
      set $upstream http://kowloon2:3000;
      proxy_pass             $upstream;
      proxy_set_header       Host              $host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_buffering        off;
      proxy_read_timeout     300s;
    }

    location / {
      set $upstream http://kowloon2:3000;
      proxy_pass         $upstream;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }

  # kwln3.local → kowloon3:3000
  server {
    listen 80;
    listen 443 ssl;
    server_name kwln3.local;

    ssl_certificate     /etc/nginx/certs/local.crt;
