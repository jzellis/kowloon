# Two-server local federation test setup.
#
# Domains:  kwln1.local  kwln2.local
# Add to /etc/hosts:  127.0.0.1  kwln1.local  kwln2.local
#
# First-time setup:
#   bash docker/gen-certs.sh
#   docker compose build
#   docker compose up -d
#
# To seed a server (run from the host):
#   TEST_BASE_URL=http://kwln1.local:8080 node scripts/seed-test.js --wipe
#   TEST_BASE_URL=http://kwln2.local:8080 node scripts/seed-test.js --wipe
#
# To rebuild after package.json changes:
#   docker compose build
#   docker volume rm kowloon-federation_node_modules
#   docker compose up -d

name: kowloon-federation

networks:
  kowloon-net:
    driver: bridge

volumes:
  mongodb_data:
  node_modules:   # shared across all app containers (same image)

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27018:27017"   # expose to host for MongoDB Compass (27017 taken by host mongod)
    networks:
      - kowloon-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── nginx (aliases let server containers resolve domain names via Docker DNS) ─
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    networks:
      kowloon-net:
        aliases:
          - kwln1.local
          - kwln2.local
    depends_on:
      - kowloon1
      - kowloon2
    restart: unless-stopped

  # ── Server 1 (kwln1.local) ───────────────────────────────────────────────
  kowloon1:
    build: .
    env_file: .env
    environment:
      DOMAIN: kwln1.local
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/kowloon1
      NODE_ENV: development
      NODE_TLS_REJECT_UNAUTHORIZED: "0"   # accept self-signed cert from nginx
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    networks:
      - kowloon-net
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  worker1:
    build: .
    command: node workers/outboxPush.js
    env_file: .env
    environment:
      DOMAIN: kwln1.local
      MONGO_URI: mongodb://mongodb:27017/kowloon1
      NODE_ENV: development
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    networks:
      - kowloon-net
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── Server 2 (kwln2.local) ───────────────────────────────────────────────
  kowloon2:
    build: .
    env_file: .env
    environment:
      DOMAIN: kwln2.local
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/kowloon2
      NODE_ENV: development
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    networks:
      - kowloon-net
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  worker2:
    build: .
    command: node workers/outboxPush.js
    env_file: .env
    environment:
      DOMAIN: kwln2.local
      MONGO_URI: mongodb://mongodb:27017/kowloon2
      NODE_ENV: development
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    networks:
      - kowloon-net
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
