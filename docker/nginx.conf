events {
  worker_connections 1024;
}

http {
  # Use Docker's internal DNS for dynamic upstream resolution.
  # This lets nginx start even if kowloon1/kowloon2 aren't up yet.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # kwln1.local → kowloon1:3000
  server {
    listen 80;
    listen 443 ssl;
    server_name kwln1.local;

    ssl_certificate     /etc/nginx/certs/local.crt;
    ssl_certificate_key /etc/nginx/certs/local.key;

    # File serving: disable proxy buffering so files stream straight through
    # without nginx trying to buffer the whole response in memory first.
    location /files/ {
      set $upstream http://kowloon1:3000;
      proxy_pass             $upstream;
      proxy_set_header       Host              $host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_buffering        off;
      proxy_read_timeout     300s;
    }

    location / {
      set $upstream http://kowloon1:3000;
      proxy_pass         $upstream;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }

  # kwln2.local → kowloon2:3000
  server {
    listen 80;
    listen 443 ssl;
    server_name kwln2.local;

    ssl_certificate     /etc/nginx/certs/local.crt;
    ssl_certificate_key /etc/nginx/certs/local.key;

    # File serving: disable proxy buffering so files stream straight through
    location /files/ {
      set $upstream http://kowloon2:3000;
      proxy_pass             $upstream;
      proxy_set_header       Host              $host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_buffering        off;
      proxy_read_timeout     300s;
    }

    location / {
      set $upstream http://kowloon2:3000;
      proxy_pass         $upstream;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }
}
